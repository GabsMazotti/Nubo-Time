<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CRM · Atendente Alcateia</title>
<style>
  :root{color-scheme:dark} *{box-sizing:border-box}
  body{margin:0;height:100vh;background:#0b141a;color:#e9edef;font:14px/1.45 system-ui,Segoe UI,Roboto,sans-serif;overflow:hidden}
  .login{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  .login input{padding:10px 14px;border-radius:8px;border:1px solid #2a3942;background:#111b21;color:#e9edef;width:280px}
  .login button{padding:10px 18px;border-radius:8px;border:0;background:#00a884;color:#fff;font-weight:700;cursor:pointer}
  .topbar{display:none;align-items:center;gap:18px;height:46px;padding:0 16px;background:#202c33;border-bottom:1px solid #222d34}
  .topbar .brand{font-weight:800}
  .topbar nav{display:flex;gap:6px}
  .topbar .tab{padding:6px 14px;border-radius:8px;color:#cbd5e1;text-decoration:none;font-weight:700;font-size:13px}
  .topbar .tab.on{background:#00a884;color:#fff}
  .topbar .tab:hover{background:#2a3942}
  .topbar .right{margin-left:auto;color:#8696a0;font-size:12px}
  .topbar .right a{color:#8696a0;cursor:pointer}
  .board{display:none;gap:12px;height:calc(100vh - 46px);overflow-x:auto;padding:14px}
  .col{background:#0f181e;border:1px solid #222d34;border-radius:10px;width:290px;min-width:290px;max-height:100%;display:flex;flex-direction:column}
  .colh{padding:10px 12px;font-weight:700;border-bottom:1px solid #222d34;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .colh .n{background:#202c33;color:#cbd5e1;border-radius:999px;padding:1px 9px;font-size:12px;flex-shrink:0}
  .cards{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
  .card{background:#1a242b;border:1px solid #222d34;border-left:3px solid #374151;border-radius:8px;padding:10px;cursor:pointer}
  .card:hover{background:#202c33}
  .card .nm{font-weight:700;display:flex;justify-content:space-between;gap:6px;align-items:center}
  .card .nm .tm{color:#8696a0;font-size:11px;font-weight:400;flex-shrink:0}
  .card .meta{color:#9fb0bb;font-size:12px;margin-top:5px;display:flex;flex-direction:column;gap:2px}
  .card .meta .line{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .tags{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px}
  .badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700;color:#fff}
  .empty{color:#56656e;text-align:center;font-size:12px;padding:14px 6px}
  .colempty{color:#56656e;font-size:12px;padding:10px;text-align:center}
</style>
</head>
<body>
  <div class="login" id="login">
    <h2>🐺 CRM Alcateia</h2>
    <div style="color:#8696a0">Digite a senha de acesso</div>
    <input id="key" type="password" placeholder="senha do painel" onkeydown="if(event.key==='Enter')saveKey()" />
    <button onclick="saveKey()">Entrar</button>
    <div id="err" style="color:#ef4444"></div>
  </div>

  <div class="topbar" id="topbar">
    <span class="brand">🐺 Alcateia</span>
    <nav>
      <a class="tab" href="./">💬 Inbox</a>
      <a class="tab on" href="crm.html">📊 CRM</a>
      <a class="tab" href="config.html">⚙️ Config</a>
    </nav>
    <span class="right"><small id="count"></small> · <a onclick="logout()">sair</a></span>
  </div>

  <div class="board" id="board"></div>

<script>
const API = "https://dttqxqnxlmkrclvhtqqx.supabase.co/functions/v1/inbox";
const TEMP = {quente:"#ef4444",morno:"#f59e0b",frio:"#3b82f6"};
const SC = {call_confirmada:"#22c55e",call_agendada:"#16a34a",qualificado:"#22c55e",em_atendimento:"#3b82f6",contato_realizado:"#64748b",novo_lead:"#64748b",precisa_humano:"#ef4444",risco_no_show:"#f97316",nao_confirmado:"#f97316",morno:"#f59e0b",nutricao:"#f59e0b",remarcar_reuniao:"#f59e0b",reuniao_remarcada:"#16a34a",reuniao_cancelada:"#6b7280",nao_qualificado:"#6b7280",sem_resposta:"#6b7280",perdido:"#6b7280",opt_out:"#6b7280",aguardando_agendamento:"#16a34a"};
const SL = {novo_lead:"Novo",contato_realizado:"Contato feito",em_atendimento:"Em atendimento",qualificado:"Qualificado",aguardando_agendamento:"Aguardando agend.",call_agendada:"Call agendada",call_confirmada:"Confirmada",nao_confirmado:"Não confirmou",risco_no_show:"Risco no-show",remarcar_reuniao:"Remarcar",reuniao_remarcada:"Remarcada",reuniao_cancelada:"Cancelada",morno:"Morno",nutricao:"Nutrição",nao_qualificado:"Não qualif.",sem_resposta:"Sem resposta",precisa_humano:"Atend. humano",perdido:"Perdido",opt_out:"Opt-out"};

// Etapas do pipeline (colunas do kanban). O lead cai na etapa do seu status (needs_human tem prioridade).
const STAGES = [
  {id:"novo",        label:"🆕 Novos",            st:["novo_lead"]},
  {id:"contato",     label:"💬 Em atendimento",   st:["contato_realizado","em_atendimento"]},
  {id:"qualificado", label:"🔥 Qualificados",     st:["qualificado","aguardando_agendamento"]},
  {id:"reuniao",     label:"📅 Reunião agendada", st:["call_agendada","call_confirmada","reuniao_remarcada"]},
  {id:"atencao",     label:"⚠️ Precisa de atenção", st:["remarcar_reuniao","nao_confirmado","risco_no_show","precisa_humano"]},
  {id:"morno",       label:"🌡️ Morno / Nutrição", st:["morno","nutricao"]},
  {id:"perdido",     label:"❌ Perdidos",          st:["nao_qualificado","sem_resposta","reuniao_cancelada","perdido","opt_out"]},
];
function stageOf(l){
  if(l.needs_human) return "atencao";
  for(const s of STAGES){ if(s.st.includes(l.status)) return s.id; }
  return "contato";
}

let KEY = localStorage.getItem("alc_key") || "";
let leads = [];

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function dm(iso){if(!iso)return"";try{return new Date(iso).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",timeZone:"America/Sao_Paulo"});}catch(e){return"";}}
function hm(iso){if(!iso)return"";try{return new Date(iso).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",timeZone:"America/Sao_Paulo"});}catch(e){return"";}}
function badge(t,c){return '<span class="badge" style="background:'+c+'">'+esc(t)+'</span>';}
function money(n){return "R$"+Number(n).toLocaleString("pt-BR");}
function budgetText(l){
  if(l.budget_raw) return l.budget_raw;
  if(l.budget_min!=null) return (l.budget_max&&l.budget_max!=l.budget_min)?money(l.budget_min)+"–"+money(l.budget_max):money(l.budget_min);
  return "—";
}

function saveKey(){const v=document.getElementById("key").value.trim();if(!v)return;KEY=v;localStorage.setItem("alc_key",v);start();}
function logout(){localStorage.removeItem("alc_key");location.reload();}
async function api(params){const r=await fetch(API+"?key="+encodeURIComponent(KEY)+params);if(r.status===401)throw new Error("unauthorized");return r.json();}

function card(l){
  const temp = TEMP[l.temperature]||"#374151";
  const mkt = [l.market,l.role].filter(Boolean).join(" · ");
  const appt = l.appt && l.appt.scheduled_at ? "📅 "+dm(l.appt.scheduled_at)+(l.appt.confirmation_status?" ("+esc(l.appt.confirmation_status)+")":"") : "";
  const tags = [
    badge(SL[l.status]||l.status, SC[l.status]||"#6b7280"),
    l.temperature?badge(l.temperature, temp):"",
    l.needs_human?badge("⚠️ Humano","#ef4444"):"",
    l.bot_paused?badge("⏸ bot off","#7c3aed"):"",
  ].filter(Boolean).join(" ");
  return '<div class="card" style="border-left-color:'+temp+'" onclick="location.href=\'./?lead='+l.id+'\'">'
    +'<div class="nm"><span>'+esc(l.name||"—")+'</span><span class="tm">'+hm(l.activity)+'</span></div>'
    +'<div class="meta">'
      +'<span class="line">💰 '+esc(budgetText(l))+'</span>'
      +(mkt?'<span class="line">🎯 '+esc(mkt)+'</span>':'')
      +(l.phone?'<span class="line">📱 '+esc(l.phone)+'</span>':'')
      +(appt?'<span class="line">'+appt+'</span>':'')
    +'</div>'
    +'<div class="tags">'+tags+'</div>'
  +'</div>';
}

function render(){
  document.getElementById("count").textContent = leads.length+" leads";
  const byStage={}; STAGES.forEach(s=>byStage[s.id]=[]);
  leads.forEach(l=>{ (byStage[stageOf(l)]||byStage.contato).push(l); });
  document.getElementById("board").innerHTML = STAGES.map(s=>{
    const arr = byStage[s.id];
    const cards = arr.length ? arr.map(card).join("") : '<div class="colempty">vazio</div>';
    return '<div class="col"><div class="colh"><span>'+s.label+'</span><span class="n">'+arr.length+'</span></div>'
      +'<div class="cards">'+cards+'</div></div>';
  }).join("");
}

async function load(){ const d=await api(""); leads=d.leads||[]; render(); }

async function start(){
  try{
    await load();
    document.getElementById("login").style.display="none";
    document.getElementById("topbar").style.display="flex";
    document.getElementById("board").style.display="flex";
    setInterval(load, 20000);
  }catch(e){ document.getElementById("err").textContent="Senha inválida."; localStorage.removeItem("alc_key"); }
}
if(KEY){ start(); }
</script>
</body>
</html>
