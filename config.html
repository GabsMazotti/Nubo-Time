<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Configurações · Atendente Alcateia</title>
<style>
  :root{color-scheme:dark} *{box-sizing:border-box}
  body{margin:0;height:100vh;background:#0b141a;color:#e9edef;font:14px/1.45 system-ui,Segoe UI,Roboto,sans-serif;overflow:hidden}
  .login{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  .login input{padding:10px 14px;border-radius:8px;border:1px solid #2a3942;background:#111b21;color:#e9edef;width:280px}
  .login button{padding:10px 18px;border-radius:8px;border:0;background:#00a884;color:#fff;font-weight:700;cursor:pointer}
  .topbar{display:none;align-items:center;gap:18px;height:46px;padding:0 16px;background:#202c33;border-bottom:1px solid #222d34}
  .topbar .brand{font-weight:800}
  .topbar nav{display:flex;gap:6px}
  .topbar .tab{padding:6px 14px;border-radius:8px;color:#cbd5e1;text-decoration:none;font-weight:700;font-size:13px}
  .topbar .tab.on{background:#00a884;color:#fff}
  .topbar .tab:hover{background:#2a3942}
  .topbar .right{margin-left:auto;color:#8696a0;font-size:12px}
  .topbar .right a{color:#8696a0;cursor:pointer}
  .wrap{display:none;height:calc(100vh - 46px);overflow-y:auto}
  .inner{max-width:860px;margin:0 auto;padding:22px 18px 90px}
  .intro{color:#8696a0;font-size:13px;margin-bottom:18px}
  .intro b{color:#e9edef}
  .field{background:#111b21;border:1px solid #222d34;border-radius:10px;padding:14px;margin-bottom:14px}
  .field h3{margin:0 0 4px;font-size:14px}
  .field .hint{color:#8696a0;font-size:12px;margin-bottom:8px}
  .field textarea{width:100%;background:#0b141a;color:#e9edef;border:1px solid #2a3942;border-radius:8px;padding:10px;font:13px/1.5 ui-monospace,Consolas,monospace;resize:vertical}
  .field .rowbtn{margin-top:6px}
  .field .reset{background:transparent;border:0;color:#8696a0;cursor:pointer;font-size:12px;text-decoration:underline}
  .savebar{position:fixed;bottom:0;left:0;right:0;background:#202c33;border-top:1px solid #222d34;padding:12px 18px;display:flex;gap:12px;align-items:center;justify-content:flex-end}
  .savebar .msg{margin-right:auto;color:#8696a0;font-size:13px}
  .savebar button{padding:10px 22px;border-radius:8px;border:0;background:#00a884;color:#fff;font-weight:700;cursor:pointer}
  .savebar button:disabled{opacity:.5;cursor:default}
  .sechead{font-weight:800;color:#cbd5e1;margin:18px 4px 8px;font-size:13px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
  <div class="login" id="login">
    <h2>🐺 Configurações Alcateia</h2>
    <div style="color:#8696a0">Digite a senha de acesso</div>
    <input id="key" type="password" placeholder="senha do painel" onkeydown="if(event.key==='Enter')saveKey()" />
    <button onclick="saveKey()">Entrar</button>
    <div id="err" style="color:#ef4444"></div>
  </div>

  <div class="topbar" id="topbar">
    <span class="brand">🐺 Alcateia</span>
    <nav>
      <a class="tab" href="./">💬 Inbox</a>
      <a class="tab" href="crm.html">📊 CRM</a>
      <a class="tab on" href="config.html">⚙️ Config</a>
      <a class="tab" href="criativos.html">🎨 Criativos</a>
    </nav>
    <span class="right"><a onclick="logout()">sair</a></span>
  </div>

  <div class="wrap" id="wrap"><div class="inner" id="inner"></div></div>

  <div class="savebar" id="savebar" style="display:none">
    <span class="msg" id="savemsg"></span>
    <button id="savebtn" onclick="saveAll()">Salvar alterações</button>
  </div>

<script>
const API = "https://dttqxqnxlmkrclvhtqqx.supabase.co/functions/v1/inbox";
let KEY = localStorage.getItem("alc_key") || "";
let DEFAULTS = {};

// Campos editáveis (mesmas chaves do backend). Ordem e textos de ajuda só para o painel.
const SECTIONS = [
  { title: "Inteligência dos atendentes (prompt)", fields: [
    { key:"prompt_base", label:"🧠 Base / personalidade (vale pros 2 atendentes)", hint:"Quem é o Gabriel, o negócio, tom de voz, a regra de qualificação (R$10k), objeções e compliance.", rows:16 },
    { key:"papel_confirmacao", label:"📅 Atendente de Confirmação (lead que JÁ agendou)", hint:"Como agir com quem já marcou a call: acolher, confirmar, remarcar.", rows:9 },
    { key:"papel_remarketing", label:"🔥 Atendente de Abordagem (lead que NÃO agendou)", hint:"Como reengajar, qualificar e conduzir pra call quem não agendou.", rows:7 },
  ]},
  { title: "Mensagens-padrão", fields: [
    { key:"msg_qualificado", label:"💬 1ª mensagem — qualificado que não agendou", hint:"Variável disponível: {nome}", rows:5 },
    { key:"msg_agendou", label:"💬 1ª mensagem — quem já agendou", hint:"Variáveis: {nome}, {quando}", rows:4 },
    { key:"msg_confirmacao", label:"✅ Resposta quando o lead confirma a call", hint:"Variável: {quando}", rows:4 },
    { key:"msg_remarcacao", label:"🔁 Resposta quando o lead quer remarcar", hint:"Variáveis: {nome}, {url}", rows:4 },
  ]},
  { title: "Lembretes de confirmação da call", note:"Enviados automaticamente 3h, 1h e 10min antes da reunião, já com o link da call (gerado pelo Calendly). Variáveis: {nome}, {horario}, {link}.", fields: [
    { key:"msg_lembrete_3h", label:"⏰ Lembrete 3 horas antes", hint:"Variáveis: {nome}, {horario}, {link}", rows:4 },
    { key:"msg_lembrete_1h", label:"⏰ Lembrete 1 hora antes", hint:"Variáveis: {nome}, {horario}, {link}", rows:4 },
    { key:"msg_lembrete_10min", label:"⏰ Lembrete 10 minutos antes", hint:"Variáveis: {nome}, {horario}, {link}", rows:4 },
  ]},
  { title: "Perguntas & respostas (FAQ)", note:"Respostas-base para os assuntos mais comuns. A IA usa como base e adapta à conversa — não cola literal.", fields: [
    { key:"faq_o_que_e", label:"❓ O que é a Alcateia? / O que vocês fazem?", hint:"", rows:3 },
    { key:"faq_como_funciona", label:"❓ Como funciona o trabalho de vocês?", hint:"", rows:3 },
    { key:"faq_preco", label:"💰 Quanto custa? / Qual o valor?", hint:"", rows:3 },
    { key:"faq_garantia", label:"🛡️ Vocês garantem resultado? Quanto vou faturar?", hint:"", rows:3 },
    { key:"faq_prazo", label:"⏱️ Em quanto tempo vejo resultado? Quando começa?", hint:"", rows:3 },
    { key:"faq_diferencial", label:"⭐ Qual o diferencial? Por que vocês?", hint:"", rows:3 },
    { key:"faq_cases", label:"📈 Têm cases? Com quem já trabalharam?", hint:"", rows:3 },
    { key:"faq_call", label:"📞 Como é a call? Quanto dura? Com quem?", hint:"", rows:3 },
    { key:"faq_contrato", label:"📄 Tem contrato / fidelidade / multa?", hint:"", rows:3 },
    { key:"faq_pagamento", label:"💳 Como é o pagamento? Parcela?", hint:"", rows:3 },
    { key:"faq_iniciante", label:"🌱 Ainda não tenho operação / quero começar do zero", hint:"", rows:3 },
    { key:"faq_plataforma", label:"🎰 Vocês fornecem a casa/plataforma de apostas?", hint:"", rows:3 },
    { key:"faq_concorrencia", label:"🤝 Já tenho agência / gestor de tráfego", hint:"", rows:3 },
    { key:"faq_robo", label:"🤖 Você é robô? É você mesmo?", hint:"", rows:3 },
  ]},
];

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function saveKey(){const v=document.getElementById("key").value.trim();if(!v)return;KEY=v;localStorage.setItem("alc_key",v);start();}
function logout(){localStorage.removeItem("alc_key");location.reload();}

async function load(){
  const r = await fetch(API+"?key="+encodeURIComponent(KEY)+"&config=1");
  if(r.status===401) throw new Error("unauthorized");
  const d = await r.json();
  DEFAULTS = d.defaults || {};
  const cfg = d.config || {};
  let html = '<div class="intro">Edite o que o atendente <b>fala e como pensa</b>. As alterações valem <b>na hora</b>, sem precisar publicar nada. As regras de segurança do atendente (identidade, formato em blocos, etapas do funil) são fixas e protegidas.</div>';
  for(const sec of SECTIONS){
    html += '<div class="sechead">'+sec.title+'</div>';
    if(sec.note) html += '<div class="intro" style="margin:-2px 4px 10px">'+esc(sec.note)+'</div>';
    for(const f of sec.fields){
      html += '<div class="field"><h3>'+f.label+'</h3><div class="hint">'+esc(f.hint)+'</div>'
        + '<textarea id="f_'+f.key+'" rows="'+(f.rows||5)+'">'+esc(cfg[f.key]!=null?cfg[f.key]:"")+'</textarea>'
        + '<div class="rowbtn"><button class="reset" onclick="resetField(\''+f.key+'\')">↩ restaurar padrão</button></div></div>';
    }
  }
  document.getElementById("inner").innerHTML = html;
}

function resetField(k){ const ta=document.getElementById("f_"+k); if(ta){ ta.value = DEFAULTS[k]||""; flash("Campo restaurado ao padrão (lembre de salvar)."); } }
function flash(m){ document.getElementById("savemsg").textContent=m; }

async function saveAll(){
  const btn=document.getElementById("savebtn"); btn.disabled=true; flash("Salvando...");
  const config={};
  for(const sec of SECTIONS) for(const f of sec.fields){ const ta=document.getElementById("f_"+f.key); if(ta) config[f.key]=ta.value; }
  try{
    const r = await fetch(API+"?key="+encodeURIComponent(KEY),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save_config",config})});
    const d = await r.json();
    if(d.ok){ flash("✅ Salvo! Já está valendo no atendimento."); } else { flash("❌ Erro ao salvar: "+(d.error||"")); }
  }catch(e){ flash("❌ Falha de conexão."); }
  btn.disabled=false;
}

async function start(){
  try{
    await load();
    document.getElementById("login").style.display="none";
    document.getElementById("topbar").style.display="flex";
    document.getElementById("wrap").style.display="block";
    document.getElementById("savebar").style.display="flex";
  }catch(e){ document.getElementById("err").textContent="Senha inválida."; localStorage.removeItem("alc_key"); }
}
if(KEY){ start(); }
</script>
</body>
</html>
