# Supabase config — Atendente Alcateia (preencha project_id ao ligar com `supabase link`)
project_id = "atendente-alcateia"

[functions.respondi-webhook]
verify_jwt = false

[functions.zapi-inbound]
verify_jwt = false

[functions.calendly-webhook]
verify_jwt = false

[functions.scheduler-tick]
# Protegida: só o cron (com header de segredo) deve chamar. Mantemos verify_jwt=false e validamos por segredo no código.
verify_jwt = false

[functions.dashboard]
# Painel de leitura protegido por senha (?key=PANEL_KEY) no próprio código.
verify_jwt = false

[functions.inbox]
# Inbox estilo WhatsApp (leitura) protegida por senha (?key=PANEL_KEY).
verify_jwt = false
